
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudList</title>

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Edu+NSW+ACT+Cursive&family=Jaini&family=Martel+Sans&family=Roboto+Condensed&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <h1>CloudList  𐔌՞. .՞𐦯</h1>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Enter your task">
      <input type="text" id="dateInput" placeholder="Select date">
      <input type="text" id="timeInput" placeholder="Select time">
      <button id="addBtn">Add Task</button>
    </div>

    <div class="progress-container">
      <div>
        <h3>Today's Tasks</h3>
        <canvas id="todayProgress" width="100" height="100"></canvas>
      </div>
      <div>
        <h3>Scheduled Tasks</h3>
        <canvas id="scheduledProgress" width="100" height="100"></canvas>
      </div>
    </div>

    <h3>Today's Tasks</h3>
    <ul id="todayTaskList"></ul>

    <h3>Scheduled Tasks</h3>
    <ul id="scheduledTaskList"></ul>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="script.js"></script>
</body>
</html>
